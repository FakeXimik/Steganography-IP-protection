name: Steganography IP Protection CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Project and Dependencies
      run: |
        python -m pip install --upgrade pip
        # This installs everything in pyproject.toml including your [test] extras
        pip install -e .[test]

    - name: Run Pytest with Coverage
      run: |
        # -v for verbose output so you can see each module pass
        pytest -v